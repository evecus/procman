name: Build and Push Docker Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          cache: true

      # --- 步骤 1: 交叉编译 Go 二进制文件 ---
      - name: Build Go binaries
        run: |
          mkdir -p build
          # 编译 amd64
          GOOS=linux GOARCH=amd64 go build -o build/procman-amd64 ./cmd/procman
          # 编译 arm64
          GOOS=linux GOARCH=arm64 go build -o build/procman-arm64 ./cmd/procman

      # --- 步骤 2: 设置 Docker Buildx (支持多架构) ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 步骤 3: 登录 Docker Hub ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- 步骤 4: 构建并推送镜像 ---
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/procman:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/procman:${{ github.sha }}
          # 将编译好的二进制作为构建上下文传入
          build-args: |
            TARGETARCH=${{ matrix.platform }}
